<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Tickets - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="login-card rounded-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600 mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">IT Tickets</h1>
            <p class="text-gray-400 text-sm mt-1">Sign in to continue</p>
        </div>

        <!-- Traditional form submit - no JavaScript needed -->
        <form action="/login" method="POST" class="space-y-6">
            <input type="hidden" name="next" value="__NEXT_URL__" />

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                <input
                    type="text"
                    name="username"
                    class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-500"
                    placeholder="Enter username"
                    autocomplete="username"
                    required
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input
                    type="password"
                    name="password"
                    class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-500"
                    placeholder="Enter password"
                    autocomplete="current-password"
                    required
                />
            </div>

            <!-- Show error if login failed -->
            <div id="errorMsg" class="text-red-400 text-sm text-center" style="display: __ERROR_DISPLAY__">
                Incorrect password. Please try again.
            </div>

            <button
                type="submit"
                class="w-full btn-primary text-white font-semibold py-3 rounded-xl transition"
            >
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/logout" class="text-gray-500 hover:text-gray-400 text-sm">Clear login</a>
        </div>
    </div>
</body>
</html>
